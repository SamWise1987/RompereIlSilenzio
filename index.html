  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mily: 'Spectral', serif; font-size: 80px; font-weight: 500; color: var(--red); line-height: .88; font-variant-numeric: tabular-nums; margin-bottom: 14px; }\n.insight-big sup { font-size: 36px; }\n.insight-txt { font-size: 15px; color: #5a4e47; line-height: 1.6; margin-bottom: 14px; }\n.insight-src { font-size: 11.5px; color: var(--muted); }\n.bars-col { padding-top: 4px; }\n.bar-group-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }\n.bar-row { display: flex; flex-direction: column; gap: 16px; }\n.bar-item {}\n.bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }\n.bar-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }\n.bar-pct { font-family: 'Spectral', serif; font-size: 17px; font-weight: 600; color: var(--orange); font-variant-numeric: tabular-nums; }\n.bar-pct.muted { color: var(--muted); }\n.bar-track { height: 7px; background: var(--mid); border-radius: 4px; overflow: hidden; }\n.bar-fill { height: 100%; border-radius: 4px; background: var(--orange); width: 0; transition: width 1.3s cubic-bezier(.4,0,.2,1); }\n.bar-fill.dim { background: var(--muted); }\n\n/* --- Colpita --- */\n#colpita { background: var(--paper); }\n.colpita-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }\n.colpita-card { background: var(--cream); border-radius: 18px; padding: 26px 24px; }\n.colpita-card h3 { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }\n.paradox-note { margin-top: 28px; padding: 18px 22px; background: var(--light); border-left: 3px solid var(--orange); border-radius: 8px; font-size: 13px; color: #6d6258; line-height: 1.6; }\n.paradox-note strong { color: var(--ink); }\n\n/* --- Strumenti --- */\n#strumenti { background: var(--cream); }\n.strumenti-hero { display: grid; grid-template-columns: auto 1fr; gap: 48px; align-items: center; margin-bottom: 44px; padding: 36px 40px; background: var(--ink); border-radius: 20px; }\n.code-rosso-badge { display: inline-block; background: var(--red); color: white; font-size: 11px; font-weight: 700; letter-spacing: .1em; padding: 5px 11px; border-radius: 6px; margin-bottom: 12px; }\n.strumenti-big { font-family: 'Spectral', serif; font-size: 76px; font-weight: 600; color: var(--orange); line-height: .9; font-variant-numeric: tabular-nums; }\n.strumenti-sub { font-size: 14px; color: #a8a09a; margin-top: 10px; max-width: 220px; line-height: 1.5; }\n.strumenti-cta { font-size: 18px; color: var(--paper); max-width: 460px; line-height: 1.6; font-family: 'Spectral', serif; font-weight: 400; font-style: italic; }\n\n/* --- Footer --- */\nfooter { background: var(--ink); color: var(--paper); padding: 72px 0 56px; }\n.footer-top { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; margin-bottom: 48px; }\n.footer-1522 { font-family: 'Spectral', serif; font-size: 80px; font-weight: 600; color: var(--orange); line-height: .9; margin-bottom: 16px; }\n.footer-1522-label { font-size: 18px; font-weight: 700; color: var(--paper); margin-bottom: 10px; }\n.footer-1522-desc { font-size: 14px; color: #9a938c; line-height: 1.65; max-width: 340px; }\n.footer-links h4 { font-size: 11px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }\n.footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }\n.footer-links a { color: #9a938c; text-decoration: none; font-size: 14px; transition: color .15s; }\n.footer-links a:hover { color: var(--paper); }\n.footer-divider { border: none; border-top: 1px solid #3a2e27; margin-bottom: 28px; }\n.footer-sources { font-size: 11.5px; color: #6a6260; line-height: 1.8; }\n.footer-sources strong { color: #9a938c; }\n\n/* --- Animations --- */\n.fade-up { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }\n.fade-up.in { opacity: 1; transform: none; }\n/* Hero stats: always visible, no animation delay */\n.hero-stat { opacity: 1 !important; transform: none !important; }\n\n/* --- Tooltip --- */\n.tooltip {\n  position: fixed; background: var(--ink); color: var(--paper); padding: 7px 12px;\n  border-radius: 8px; font-size: 12.5px; font-weight: 600; pointer-events: none;\n  opacity: 0; transition: opacity .1s; z-index: 900; white-space: nowrap;\n  font-variant-numeric: tabular-nums;\n}\n\n/* --- Responsive --- */\n@media (max-width: 900px) {\n  #hero .container { grid-template-columns: 1fr; gap: 40px; }\n  .sommerso-layout { grid-template-columns: 1fr; gap: 40px; }\n  .charts-2col { grid-template-columns: 1fr; }\n  .autore-layout { grid-template-columns: 1fr; gap: 32px; }\n  .colpita-grid { grid-template-columns: 1fr; }\n  .strumenti-hero { grid-template-columns: 1fr; gap: 24px; }\n  .footer-top { grid-template-columns: 1fr; gap: 40px; }\n  .nav-links { display: none; }\n  nav { padding: 0 20px; }\n  .container { padding: 0 24px; }\n  section { padding: 64px 0; }\n  .waffle-grid { max-width: 100%; }\n}\n@media (max-width: 600px) {\n  .badge-1522 { bottom: 16px; right: 16px; font-size: 12px; padding: 9px 14px; }\n  .colpita-grid { grid-template-columns: 1fr; }\n}\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n\n<!-- Always-visible 1522 -->\n<a href=\"tel:1522\" class=\"badge-1522\" title=\"Numero antiviolenza e stalking — gratuito H24\">\n  <span class=\"badge-dot\"><\u002Fspan>\n  <span class=\"badge-label\" data-it=\"1522 · Antiviolenza\" data-en=\"1522 · Helpline\">1522 · Antiviolenza<\u002Fspan>\n<\u002Fa>\n\n<!-- Nav -->\n<nav id=\"main-nav\">\n  <span class=\"nav-logo\">Rompere il silenzio<\u002Fspan>\n  <ul class=\"nav-links\" id=\"nav-links\">\n    <li><a href=\"#sommerso\" data-it=\"Il Sommerso\" data-en=\"The Iceberg\">Il Sommerso<\u002Fa><\u002Fli>\n    <li><a href=\"#tempo\" data-it=\"Nel Tempo\" data-en=\"Over Time\">Nel Tempo<\u002Fa><\u002Fli>\n    <li><a href=\"#autore\" data-it=\"Chi Agisce\" data-en=\"Perpetrators\">Chi Agisce<\u002Fa><\u002Fli>\n    <li><a href=\"#colpita\" data-it=\"Chi è Colpita\" data-en=\"Who is Affected\">Chi è Colpita<\u002Fa><\u002Fli>\n    <li><a href=\"#strumenti\" data-it=\"Gli Strumenti\" data-en=\"Legal Tools\">Gli Strumenti<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <div class=\"lang-toggle\">\n    <button id=\"btn-it\" class=\"active\" onclick=\"setLang('it')\">IT<\u002Fbutton>\n    <button id=\"btn-en\" onclick=\"setLang('en')\">EN<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- Hero -->\n<section id=\"hero\">\n  <div class=\"container\">\n    <div>\n      <p class=\"hero-meta\" data-it=\"Violenza di genere · Italia · 2014–2024\" data-en=\"Gender-based violence · Italy · 2014–2024\">Violenza di genere · Italia · 2014–2024<\u002Fp>\n      <h1>Dietro ogni dato<br>c'è <em class=\"highlight\">una storia<\u002Fem><br>che merita ascolto.<\u002Fh1>\n      <p class=\"hero-sub\" data-it=\"Un percorso nei numeri ufficiali sulla violenza sulle donne in Italia: indagini ISTAT e dati del Ministero dell'Interno 2014–2024. Conoscere i numeri è il primo passo per cambiarli.\" data-en=\"A journey through official data on violence against women in Italy: ISTAT surveys and Ministry of Interior figures 2014–2024. Knowing the numbers is the first step toward changing them.\">Un percorso nei numeri ufficiali sulla violenza sulle donne in Italia: indagini ISTAT e dati del Ministero dell'Interno 2014–2024. Conoscere i numeri è il primo passo per cambiarli.<\u002Fp>\n      <div class=\"scroll-hint\">\n        <div class=\"scroll-arrow\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 2v8M2.5 6.5 6 10l3.5-3.5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <span data-it=\"Esplora i dati\" data-en=\"Explore the data\">Esplora i dati<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-stats\">\n      <div class=\"hero-stat\">\n        <div class=\"stat-num\">31,5%<\u002Fdiv>\n        <div class=\"stat-lbl\" data-it=\"delle donne tra 16 e 70 anni ha subìto violenza fisica o sessuale nella vita · ISTAT 2022\" data-en=\"of women aged 16–70 experienced physical or sexual violence in their lifetime · ISTAT 2022\">delle donne tra 16 e 70 anni ha subìto violenza fisica o sessuale nella vita · ISTAT 2022<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-stat red\">\n        <div class=\"stat-num\">1 su 10<\u002Fdiv>\n        <div class=\"stat-lbl\" data-it=\"tra le sopravvissute ha denunciato la violenza alle autorità competenti\" data-en=\"among survivors reported the violence to the relevant authorities\">tra le sopravvissute ha denunciato la violenza alle autorità competenti<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-stat\">\n        <div class=\"stat-num\">+326%<\u002Fdiv>\n        <div class=\"stat-lbl\" data-it=\"gli ammonimenti del questore per violenza domestica dal 2014 al 2024\" data-en=\"growth in police domestic violence warning orders from 2014 to 2024\">gli ammonimenti del questore per violenza domestica dal 2014 al 2024<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Il Sommerso -->\n<section id=\"sommerso\">\n  <div class=\"container\">\n    <div class=\"section-label\" data-it=\"01 · Il Sommerso\" data-en=\"01 · The Iceberg\">01 · Il Sommerso<\u002Fdiv>\n    <h2 class=\"section-title\" data-it=\"Il numero che non vediamo\" data-en=\"The number we don't see\">Il numero che non vediamo<\u002Fh2>\n    <p class=\"section-body\" data-it=\"Ogni punto qui sotto rappresenta una donna su cento. Nella realtà, la violenza di genere è un fenomeno in larga parte invisibile: la stragrande maggioranza di chi la subisce non riesce — o non può — parlarne.\" data-en=\"Every dot below represents one woman in a hundred. In reality, gender-based violence is largely invisible: the vast majority of those who experience it cannot — or do not — speak out.\">Ogni punto qui sotto rappresenta una donna su cento. Nella realtà, la violenza di genere è un fenomeno in larga parte invisibile: la stragrande maggioranza di chi la subisce non riesce — o non può — parlarne.<\u002Fp>\n    <div class=\"sommerso-layout\">\n      <div class=\"waffle-wrap\">\n        <p class=\"waffle-title\" data-it=\"Su 100 donne tra 16 e 70 anni...\" data-en=\"Out of 100 women aged 16–70...\">Su 100 donne tra 16 e 70 anni...<\u002Fp>\n        <div class=\"waffle-grid\" id=\"waffle\" aria-label=\"Griglia di 100 punti: 32 hanno subìto violenza, 3 l'hanno denunciata\"><\u002Fdiv>\n        <div class=\"waffle-legend\">\n          <div class=\"legend-row\"><div class=\"legend-swatch\" style=\"background:var(--orange);opacity:1;box-shadow:0 0 5px rgba(232,102,42,.5)\"><\u002Fdiv><span class=\"ll\" data-it=\"Ha denunciato alle autorità (~3 su 100)\" data-en=\"Reported to authorities (~3 in 100)\">Ha denunciato alle autorità (~3 su 100)<\u002Fspan><\u002Fdiv>\n          <div class=\"legend-row\"><div class=\"legend-swatch\" style=\"background:var(--orange);opacity:.45\"><\u002Fdiv><span class=\"ll\" data-it=\"Ha subìto violenza (32 su 100)\" data-en=\"Experienced violence (32 in 100)\">Ha subìto violenza (32 su 100)<\u002Fspan><\u002Fdiv>\n          <div class=\"legend-row\"><div class=\"legend-swatch\" style=\"background:#3a2e27\"><\u002Fdiv><span class=\"ll\" data-it=\"Non ha subìto violenza\" data-en=\"Did not experience violence\">Non ha subìto violenza<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"denunce-note\" style=\"margin-top:24px;\">\n          <p data-it=\"&lt;strong&gt;Solo 1 sopravvissuta su 10&lt;/strong&gt; denuncia alle forze dell'ordine. Le motivazioni più frequenti: paura di non essere creduta, vergogna, dipendenza economica dal partner, timore di ritorsioni.\" data-en=\"&lt;strong&gt;Only 1 survivor in 10&lt;/strong&gt; reports to law enforcement. The most common reasons: fear of not being believed, shame, financial dependence on the partner, fear of retaliation.\"><strong>Solo 1 sopravvissuta su 10<\u002Fstrong> denuncia alle forze dell'ordine. Le motivazioni più frequenti: paura di non essere creduta, vergogna, dipendenza economica dal partner, timore di ritorsioni.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"recency-col\">\n        <p class=\"recency-label\" data-it=\"Prevalenza della violenza fisica o sessuale\" data-en=\"Prevalence of physical or sexual violence\">Prevalenza della violenza fisica o sessuale<\u002Fp>\n        <div class=\"recency-item\">\n          <div class=\"rec-num\"><span class=\"cnt\" data-target=\"32\">0<\u002Fspan><sup>%<\u002Fsup><\u002Fdiv>\n          <div class=\"rec-bar-track\"><div class=\"rec-bar-fill\" data-w=\"100\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"rec-desc\" data-it=\"nella vita (donne 16–70 anni)\" data-en=\"in their lifetime (women aged 16–70)\">nella vita (donne 16–70 anni)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"recency-item\">\n          <div class=\"rec-num\"><span class=\"cnt\" data-target=\"11\">0<\u002Fspan><sup>%<\u002Fsup><\u002Fdiv>\n          <div class=\"rec-bar-track\"><div class=\"rec-bar-fill\" data-w=\"34\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"rec-desc\" data-it=\"negli ultimi 5 anni\" data-en=\"in the last 5 years\">negli ultimi 5 anni<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"recency-item\">\n          <div class=\"rec-num\"><span class=\"cnt\" data-target=\"5\">0<\u002Fspan><sup>%<\u002Fsup><\u002Fdiv>\n          <div class=\"rec-bar-track\"><div class=\"rec-bar-fill\" data-w=\"16\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"rec-desc\" data-it=\"negli ultimi 12 mesi\" data-en=\"in the last 12 months\">negli ultimi 12 mesi<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Nel Tempo -->\n<section id=\"tempo\">\n  <div class=\"container\">\n    <div class=\"section-label\" data-it=\"02 · Nel Tempo\" data-en=\"02 · Over Time\">02 · Nel Tempo<\u002Fdiv>\n    <h2 class=\"section-title\" data-it=\"Dieci anni di dati ufficiali\" data-en=\"Ten years of official data\">Dieci anni di dati ufficiali<\u002Fh2>\n    <p class=\"section-body\" data-it=\"Le denunce per maltrattamenti sono cresciute del 90% dal 2014, segnale di maggiore consapevolezza e disponibilità a denunciare. Gli ammonimenti del questore, strumento extragiudiziale e rapido, sono cresciuti del 326% nello stesso periodo.\" data-en=\"Reports of domestic violence have grown 90% since 2014, signaling greater awareness and willingness to report. Police warning orders — a fast extrajudicial tool — have grown 326% in the same period.\">Le denunce per maltrattamenti sono cresciute del 90% dal 2014, segnale di maggiore consapevolezza e disponibilità a denunciare. Gli ammonimenti del questore, strumento extragiudiziale e rapido, sono cresciuti del 326% nello stesso periodo.<\u002Fp>\n    <div class=\"charts-2col\">\n      <div class=\"chart-card fade-up\">\n        <p class=\"chart-tag\" data-it=\"Fonte: SDI-SSD Ministero dell'Interno · Italia 2014–2023\" data-en=\"Source: SDI-SSD Ministry of Interior · Italy 2014–2023\">Fonte: SDI-SSD Min. Interno · 2014–2023<\u002Fp>\n        <h3 data-it=\"Denunce per maltrattamenti\" data-en=\"Domestic violence reports\">Denunce per maltrattamenti<\u002Fh3>\n        <div class=\"chart-delta\">+90%<\u002Fdiv>\n        <svg id=\"svg-maltr\" class=\"chart-svg\" viewBox=\"0 0 440 170\"><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"chart-card fade-up\">\n        <p class=\"chart-tag\" data-it=\"Fonte: Ministero dell'Interno · Italia 2014–2024\" data-en=\"Source: Ministry of Interior · Italy 2014–2024\">Fonte: Min. Interno · 2014–2024<\u002Fp>\n        <h3 data-it=\"Ammonimenti del Questore\" data-en=\"Police warning orders\">Ammonimenti del Questore<\u002Fh3>\n        <div class=\"chart-delta red\">+326%<\u002Fdiv>\n        <svg id=\"svg-ammon\" class=\"chart-svg\" viewBox=\"0 0 440 170\"><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Chi Agisce -->\n<section id=\"autore\">\n  <div class=\"container\">\n    <div class=\"section-label\" data-it=\"03 · Chi Agisce\" data-en=\"03 · Perpetrators\">03 · Chi Agisce<\u002Fdiv>\n    <h2 class=\"section-title\" data-it=\"Quasi sempre qualcuno di conosciuto\" data-en=\"Almost always someone known\">Quasi sempre qualcuno di conosciuto<\u002Fh2>\n    <p class=\"section-body\" data-it=\"Il mito dello sconosciuto è pericoloso. I dati ISTAT mostrano che la violenza nasce il più delle volte all'interno di relazioni — di coppia, familiari, amicali. Riconoscerla è più difficile quando l'autore è qualcuno di cui ci fidiamo.\" data-en=\"The myth of the stranger is dangerous. ISTAT data shows that violence most often occurs within relationships — intimate, family, or social. Recognizing it is harder when the perpetrator is someone we trust.\">Il mito dello sconosciuto è pericoloso. I dati ISTAT mostrano che la violenza nasce il più delle volte all'interno di relazioni — di coppia, familiari, amicali. Riconoscerla è più difficile quando l'autore è qualcuno di cui ci fidiamo.<\u002Fp>\n    <div class=\"autore-layout\">\n      <div class=\"insight-card\">\n        <div class=\"insight-big\">2<sup>/3<\u002Fsup><\u002Fdiv>\n        <p class=\"insight-txt\" data-it=\"dei casi di violenza fisica o sessuale proviene da qualcuno che la sopravvissuta conosceva: partner, ex-partner, parente, amico o collega.\" data-en=\"of cases of physical or sexual violence come from someone the survivor knew: partner, ex-partner, relative, friend, or colleague.\">dei casi di violenza fisica o sessuale proviene da qualcuno che la sopravvissuta conosceva: partner, ex-partner, parente, amico o collega.<\u002Fp>\n        <p class=\"insight-src\">Fonte: ISTAT, Indagine sulla sicurezza delle donne 2022<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bars-col\">\n        <p class=\"bar-group-title\" data-it=\"% donne che hanno subìto violenza (non-partner, lifetime)\" data-en=\"% women experiencing violence (non-partner, lifetime)\">% donne che hanno subìto violenza (non-partner, lifetime)<\u002Fp>\n        <div class=\"bar-row\" id=\"autore-bars\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Chi è Colpita -->\n<section id=\"colpita\">\n  <div class=\"container\">\n    <div class=\"section-label\" data-it=\"04 · Chi è Colpita\" data-en=\"04 · Who is Affected\">04 · Chi è Colpita<\u002Fdiv>\n    <h2 class=\"section-title\" data-it=\"Non esiste un profilo unico\" data-en=\"There is no single profile\">Non esiste un profilo unico<\u002Fh2>\n    <p class=\"section-body\" data-it=\"La violenza attraversa ogni fascia sociale, ogni età, ogni livello d'istruzione. Alcuni profili mostrano vulnerabilità specifiche che i dati ISTAT aiutano a illuminare.\" data-en=\"Violence crosses every social background, age, and education level. Some profiles show specific vulnerabilities that ISTAT data helps illuminate.\">La violenza attraversa ogni fascia sociale, ogni età, ogni livello d'istruzione. Alcuni profili mostrano vulnerabilità specifiche che i dati ISTAT aiutano a illuminare.<\u002Fp>\n    <div class=\"colpita-grid\">\n      <div class=\"colpita-card fade-up\">\n        <h3 data-it=\"Stato civile · % nella vita\" data-en=\"Marital status · % lifetime\">Stato civile · % nella vita<\u002Fh3>\n        <div class=\"bar-row\" id=\"marital-bars\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"colpita-card fade-up\">\n        <h3 data-it=\"Titolo di studio · % nella vita\" data-en=\"Education level · % lifetime\">Titolo di studio · % nella vita<\u002Fh3>\n        <div class=\"bar-row\" id=\"edu-bars\"><\u002Fdiv>\n        <div class=\"paradox-note\" style=\"margin-top:20px;\">\n          <strong data-it=\"Il paradosso dell'istruzione:\" data-en=\"The education paradox:\">Il paradosso dell'istruzione:<\u002Fstrong>\n          <span data-it=\" le donne con titolo più alto riportano tassi più elevati, riflettendo spesso una maggiore consapevolezza e propensione a riconoscere la violenza.\" data-en=\" women with higher education report higher rates, often reflecting greater awareness and willingness to recognize and name violence.\"> le donne con titolo più alto riportano tassi più elevati, riflettendo spesso una maggiore consapevolezza e propensione a riconoscere la violenza.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"colpita-card fade-up\">\n        <h3 data-it=\"Fascia d'età · % nella vita\" data-en=\"Age group · % lifetime\">Fascia d'età · % nella vita<\u002Fh3>\n        <div class=\"bar-row\" id=\"age-bars\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Gli Strumenti -->\n<section id=\"strumenti\">\n  <div class=\"container\">\n    <div class=\"section-label\" data-it=\"05 · Gli Strumenti\" data-en=\"05 · Legal Tools\">05 · Gli Strumenti<\u002Fdiv>\n    <h2 class=\"section-title\" data-it=\"Più tutele, più risposte\" data-en=\"More protection, more response\">Più tutele, più risposte<\u002Fh2>\n    <p class=\"section-body\" data-it=\"Il Codice Rosso (L. 69/2019) ha trasformato la risposta istituzionale, quadruplicando le misure cautelari penali in un solo anno. Gli strumenti esistono — bisogna sapere come usarli.\" data-en=\"The Codice Rosso law (L. 69/2019) transformed the institutional response, quadrupling criminal protective measures in a single year. The tools exist — the key is knowing how to use them.\">Il Codice Rosso (L. 69/2019) ha trasformato la risposta istituzionale, quadruplicando le misure cautelari penali in un solo anno. Gli strumenti esistono — bisogna sapere come usarli.<\u002Fp>\n    <div class=\"strumenti-hero fade-up\">\n      <div>\n        <div class=\"code-rosso-badge\">2019 · Codice Rosso<\u002Fdiv>\n        <div class=\"strumenti-big\">12.235<\u002Fdiv>\n        <p class=\"strumenti-sub\" data-it=\"allontanamenti cautelari dalla casa familiare in un solo anno: quasi 4 volte il dato del 2018\" data-en=\"emergency exclusion orders in a single year: nearly 4 times the 2018 figure\">allontanamenti cautelari in un anno — 4× il dato 2018<\u002Fp>\n      <\u002Fdiv>\n      <p class=\"strumenti-cta\" data-it=\"Ogni allontanamento è una porta che si chiude tra una donna e chi la stava facendo del male. Gli strumenti di tutela esistono: se sei in pericolo, chiamaci.\" data-en=\"Every exclusion order is a door closed between a woman and her abuser. Protection tools exist: if you are in danger, reach out.\">Ogni allontanamento è una porta che si chiude tra una donna e chi la stava facendo del male. Gli strumenti di tutela esistono: se sei in pericolo, chiamaci.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"charts-2col\">\n      <div class=\"chart-card fade-up\">\n        <p class=\"chart-tag\" data-it=\"Fonte: Ministero della Giustizia · 2015–2024\" data-en=\"Source: Ministry of Justice · 2015–2024\">Fonte: Min. Giustizia · 2015–2024<\u002Fp>\n        <h3 data-it=\"Allontanamenti cautelari dalla casa\" data-en=\"Emergency exclusion orders\">Allontanamenti cautelari dalla casa<\u002Fh3>\n        <div class=\"chart-delta red\">↑ dopo Codice Rosso<\u002Fdiv>\n        <svg id=\"svg-allont\" class=\"chart-svg\" viewBox=\"0 0 440 170\"><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"chart-card fade-up\">\n        <p class=\"chart-tag\" data-it=\"Fonte: Ministero della Giustizia · 2014–2024\" data-en=\"Source: Ministry of Justice · 2014–2024\">Fonte: Min. Giustizia · 2014–2024<\u002Fp>\n        <h3 data-it=\"Ordini di protezione civili\" data-en=\"Civil protection orders\">Ordini di protezione civili<\u002Fh3>\n        <div class=\"chart-delta\">530–670 / anno<\u002Fdiv>\n        <svg id=\"svg-ordini\" class=\"chart-svg\" viewBox=\"0 0 440 170\"><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Footer -->\n<footer>\n  <div class=\"container\">\n    <div class=\"footer-top\">\n      <div>\n        <div class=\"footer-1522\">1522<\u002Fdiv>\n        <div class=\"footer-1522-label\" data-it=\"Numero antiviolenza e stalking\" data-en=\"Anti-violence and stalking helpline\">Numero antiviolenza e stalking<\u002Fdiv>\n        <p class=\"footer-1522-desc\" data-it=\"Gratuito, attivo 24h su 24, 7 giorni su 7. Operatrici specializzate. Puoi chiamare o scrivere su WhatsApp. L'anonimato è garantito.\" data-en=\"Free, available 24/7. Specialist operators. Call or WhatsApp. Anonymity guaranteed.\">Gratuito, attivo 24h su 24, 7 giorni su 7. Operatrici specializzate. Puoi chiamare o scrivere su WhatsApp. L'anonimato è garantito.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"footer-links\">\n        <h4 data-it=\"Risorse utili\" data-en=\"Useful resources\">Risorse utili<\u002Fh4>\n        <ul>\n          <li><a href=\"https://www.1522.eu\" target=\"_blank\" rel=\"noopener\">1522.eu — Sito ufficiale<\u002Fa><\u002Fli>\n          <li><a href=\"https://www.istat.it\" target=\"_blank\" rel=\"noopener\">ISTAT — Indagine sulla sicurezza delle donne<\u002Fa><\u002Fli>\n          <li><a href=\"https://www.interno.gov.it\" target=\"_blank\" rel=\"noopener\">Ministero dell'Interno — Dati SDI-SSD<\u002Fa><\u002Fli>\n          <li><a href=\"https://www.giustizia.it\" target=\"_blank\" rel=\"noopener\">Ministero della Giustizia — Misure di protezione<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <hr class=\"footer-divider\">\n    <p class=\"footer-sources\">\n      <strong>Fonti dei dati:<\u002Fstrong>\n      ISTAT – Indagine multiscopo sulla sicurezza delle donne 2022–2023 (prevalenza lifetime, dati per stato civile, istruzione, tipo di autore) ·\n      Ministero dell'Interno – Database operativo SDI-SSD: denunce per maltrattamenti art. 572 c.p. e ammonimenti del questore 2014–2024 ·\n      Ministero della Giustizia – Misure di protezione: ordini civili e misure cautelari penali 2014–2024 ·\n      Elaborazione propria su dati nazionali (Italia). Le percentuali sulla violenza si riferiscono alla popolazione femminile 16–70 anni.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div class=\"tooltip\" id=\"tooltip\"><\u002Fdiv>\n\n<script>\n// ===== DATA =====\nconst DATA = {\n  maltrattamenti: {\n    yrs: [2014,2015,2016,2017,2018,2019,2020,2021,2022,2023],\n    vals: [13261,12890,14247,15626,17453,20850,21709,23728,24570,25260]\n  },\n  ammonimenti: {\n    yrs: [2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024],\n    vals: [1526,1366,1461,1567,2164,2547,2333,2822,3629,4497,6498]\n  },\n  allontanamenti: {\n    yrs: [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024],\n    vals: [1269,1806,2732,3158,12235,3392,3181,3156,3489,4499],\n    annotIdx: 4\n  },\n  ordini: {\n    yrs: [2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024],\n    vals: [615,646,659,612,668,592,578,621,531,556,534]\n  },\n  perpetrators: [\n    { it:'Persona conosciuta', en:'Known person',   v:13, hi:true },\n    { it:'Sconosciuto',        en:'Stranger',        v:13, hi:false },\n    { it:'Conoscente',         en:'Acquaintance',    v:6,  hi:false },\n    { it:'Parente',            en:'Relative',        v:3,  hi:false },\n    { it:'Amico / Collega',    en:'Friend/Colleague',v:3,  hi:false }\n  ],\n  marital: [\n    { it:'Separate/divorziate', en:'Separated/divorced', v:51 },\n    { it:'Single',              en:'Single',               v:36 },\n    { it:'Vedove',              en:'Widowed',              v:28 },\n    { it:'Sposate/conviventi',  en:'Married/cohabiting',   v:27 }\n  ],\n  education: [\n    { it:'Laurea o superiore',  en:'Degree or higher',     v:43 },\n    { it:'Diploma',             en:'Upper secondary',      v:35 },\n    { it:'Licenza media',       en:'Lower secondary',      v:27 },\n    { it:'Nessun titolo',       en:'No qualification',     v:17 }\n  ],\n  age: [\n    { it:'35–44', en:'35–44', v:36.2 },\n    { it:'45–54', en:'45–54', v:34.6 },\n    { it:'25–34', en:'25–34', v:33.6 },\n    { it:'55–64', en:'55–64', v:28.0 },\n    { it:'16–24', en:'16–24', v:22.7 },\n    { it:'65–70', en:'65–70', v:19.4 }\n  ]\n};\n\n// ===== LANG =====\nlet lang = localStorage.getItem('dash-lang') || 'it';\nfunction setLang(l) {\n  lang = l;\n  localStorage.setItem('dash-lang', l);\n  document.querySelectorAll('[data-it]').forEach(el => {\n    const txt = el.dataset[l] || el.dataset.it;\n    if (el.tagName === 'INPUT' || el.tagName === 'BUTTON') el.value = txt;\n    else el.innerHTML = txt;\n  });\n  document.getElementById('btn-it').classList.toggle('active', l === 'it');\n  document.getElementById('btn-en').classList.toggle('active', l === 'en');\n  renderAllBars();\n}\n\n// ===== WAFFLE =====\nfunction buildWaffle() {\n  const g = document.getElementById('waffle');\n  for (let i = 0; i < 100; i++) {\n    const d = document.createElement('div');\n    const cls = i < 3 ? 'waffle-dot rep' : i < 32 ? 'waffle-dot exp' : 'waffle-dot';\n    d.className = cls;\n    g.appendChild(d);\n  }\n}\n\n// ===== SVG LINE CHART =====\nconst NS = 'http://www.w3.org/2000/svg';\nconst O = '#E8662A', R = '#C4302B', MT = '#e5d0bb', LC = '#a99e92';\n\nfunction svgEl(tag, attrs, txt) {\n  const el = document.createElementNS(NS, tag);\n  Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, v));\n  if (txt != null) el.textContent = txt;\n  return el;\n}\n\nfunction drawLine(svgId, cfg) {\n  const { yrs, vals, color = O, annotIdx = -1 } = cfg;\n  const svg = document.getElementById(svgId);\n  if (!svg) return;\n  const W = 440, H = 170, PL = 46, PR = 14, PT = 18, PB = 32;\n  const CW = W - PL - PR, CH = H - PT - PB;\n  const maxV = Math.max(...vals), minV = 0;\n  const xS = i => PL + (i / (yrs.length - 1)) * CW;\n  const yS = v => PT + CH - ((v - minV) / (maxV - minV)) * CH;\n  const pts = vals.map((v, i) => [xS(i), yS(v)]);\n\n  // Grid\n  [0, 0.5, 1].forEach(t => {\n    const y = PT + CH * (1 - t), v = Math.round(maxV * t);\n    svg.appendChild(svgEl('line', { x1: PL, x2: PL + CW, y1: y, y2: y, stroke: MT, 'stroke-width': '1' }));\n    svg.appendChild(svgEl('text', { x: PL - 5, y: y + 4, 'text-anchor': 'end', 'font-size': '9', fill: LC, 'font-family': 'Hanken Grotesk, sans-serif' }, v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v));\n  });\n\n  // Area\n  const aD = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ')\n    + ` L${pts[pts.length-1][0].toFixed(1)},${PT+CH} L${pts[0][0].toFixed(1)},${PT+CH} Z`;\n  svg.appendChild(svgEl('path', { d: aD, fill: color, opacity: '0.1' }));\n\n  // Codice Rosso annotation\n  if (annotIdx >= 0) {\n    const ax = xS(annotIdx);\n    svg.appendChild(svgEl('line', { x1: ax, x2: ax, y1: PT, y2: PT + CH, stroke: R, 'stroke-width': '1.5', 'stroke-dasharray': '4,3' }));\n    svg.appendChild(svgEl('text', { x: ax + 4, y: PT + 11, 'font-size': '8.5', fill: R, 'font-family': 'Hanken Grotesk, sans-serif', 'font-weight': '700' }, 'Codice Rosso'));\n  }\n\n  // Line path\n  const lD = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');\n  svg.appendChild(svgEl('path', { d: lD, fill: 'none', stroke: color, 'stroke-width': '2.5', 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));\n\n  // Last dot\n  const lp = pts[pts.length - 1];\n  svg.appendChild(svgEl('circle', { cx: lp[0], cy: lp[1], r: '4', fill: color }));\n\n  // Year labels (every other)\n  yrs.forEach((y, i) => {\n    if (i % 2 !== 0 && i !== yrs.length - 1) return;\n    svg.appendChild(svgEl('text', { x: xS(i), y: H - 4, 'text-anchor': 'middle', 'font-size': '9', fill: LC, 'font-family': 'Hanken Grotesk, sans-serif' }, String(y).slice(2)));\n  });\n\n  // Hover interaction\n  const tip = document.getElementById('tooltip');\n  pts.forEach(([cx, cy], i) => {\n    const hit = svgEl('circle', { cx, cy, r: '18', fill: 'transparent', cursor: 'pointer' });\n    const dot = svgEl('circle', { cx, cy, r: '3.5', fill: color, opacity: i === pts.length - 1 ? '1' : '0', 'pointer-events': 'none' });\n    dot.style.transition = 'opacity .1s';\n    hit.addEventListener('mouseenter', () => { dot.setAttribute('opacity', '1'); tip.style.opacity = '1'; tip.textContent = `${yrs[i]}: ${vals[i].toLocaleString('it')}`; });\n    hit.addEventListener('mousemove', e => { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 32) + 'px'; });\n    hit.addEventListener('mouseleave', () => { dot.setAttribute('opacity', i === pts.length - 1 ? '1' : '0'); tip.style.opacity = '0'; });\n    svg.appendChild(hit);\n    svg.appendChild(dot);\n  });\n}\n\n// ===== BAR SETS =====\nfunction makeBar(label, pct, maxPct, color, dimColor) {\n  const fillW = (pct / maxPct * 100).toFixed(1);\n  const d = document.createElement('div');\n  d.className = 'bar-item';\n  d.innerHTML = `<div class=\"bar-top\"><span class=\"bar-name\">${label}<\u002Fspan><span class=\"bar-pct\" style=\"color:${color}\">${pct}%<\u002Fspan><\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill\" style=\"background:${color}\" data-w=\"${fillW}\"><\u002Fdiv><\u002Fdiv>`;\n  return d;\n}\n\nfunction renderBarGroup(id, items, maxV, colorFn) {\n  const c = document.getElementById(id);\n  if (!c) return;\n  c.innerHTML = '';\n  items.forEach(item => {\n    const label = item[lang] || item.it;\n    const color = colorFn(item);\n    c.appendChild(makeBar(label, item.v, maxV, color));\n  });\n  // animate immediately if already visible\n  requestAnimationFrame(() => {\n    c.querySelectorAll('.bar-fill[data-w]').forEach(el => { el.style.width = el.dataset.w + '%'; });\n  });\n}\n\nfunction renderAllBars() {\n  renderBarGroup('autore-bars', DATA.perpetrators, 13, it => it.hi ? O : LC);\n  renderBarGroup('marital-bars', DATA.marital, 51, () => O);\n  renderBarGroup('edu-bars', DATA.education, 43, () => O);\n  renderBarGroup('age-bars', DATA.age, 36.2, () => O);\n}\n\n// ===== COUNTER ANIMATION =====\nfunction animCount(el, target, dur = 1300) {\n  const t0 = performance.now();\n  const tick = now => {\n    const p = Math.min((now - t0) / dur, 1);\n    const e = 1 - Math.pow(1 - p, 3);\n    el.textContent = Math.round(e * target);\n    if (p < 1) requestAnimationFrame(tick);\n  };\n  requestAnimationFrame(tick);\n}\n\n// ===== INTERSECTION OBSERVER =====\nfunction observe(selector, fn, opts = {}) {\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { fn(e.target); if (opts.once !== false) io.unobserve(e.target); } });\n  }, { threshold: opts.thresh || 0.18 });\n  document.querySelectorAll(selector).forEach(el => io.observe(el));\n}\n\n// ===== ACTIVE NAV =====\nfunction initNav() {\n  const links = document.querySelectorAll('.nav-links a');\n  const sections = ['sommerso', 'tempo', 'autore', 'colpita', 'strumenti'];\n  const io = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      const a = document.querySelector(`.nav-links a[href=\"#${e.target.id}\"]`);\n      if (a) a.classList.toggle('active', e.isIntersecting);\n    });\n  }, { threshold: 0.35, rootMargin: '-5% 0px -5% 0px' });\n  sections.forEach(id => { const el = document.getElementById(id); if (el) io.observe(el); });\n}\n\n// ===== INIT =====\ndocument.addEventListener('DOMContentLoaded', () => {\n  // Restore lang\n  setLang(lang);\n\n  buildWaffle();\n\n  drawLine('svg-maltr', DATA.maltrattamenti);\n  drawLine('svg-ammon', { ...DATA.ammonimenti, color: R });\n  drawLine('svg-allont', { ...DATA.allontanamenti, color: R });\n  drawLine('svg-ordini', DATA.ordini);\n\n  renderAllBars();\n  initNav();\n\n  // Fade-up on scroll — also immediately reveal already-visible elements\n  observe('.fade-up', el => el.classList.add('in'));\n  setTimeout(() => {\n    document.querySelectorAll('.fade-up').forEach(el => {\n      const r = el.getBoundingClientRect();\n      if (r.top < window.innerHeight && r.bottom > 0) el.classList.add('in');\n    });\n  }, 60);\n\n  // Counters when #sommerso enters\n  observe('#sommerso', () => {\n    document.querySelectorAll('.cnt').forEach(el => animCount(el, +el.dataset.target));\n    document.querySelectorAll('.rec-bar-fill[data-w]').forEach(el => { el.style.width = el.dataset.w + '%'; });\n  }, { thresh: 0.25 });\n\n  // Bars when sections enter\n  ['autore', 'colpita'].forEach(id => {\n    observe('#' + id, () => {\n      document.querySelectorAll(`#${id} .bar-fill[data-w]`).forEach(el => { el.style.width = el.dataset.w + '%'; });\n    }, { thresh: 0.15 });\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
